name: Sync Notion Blog

on:
  schedule:
    # 每天早上8点自动同步
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Notion Database
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ vars.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"sorts": [{"property": "Date", "direction": "descending"}]}' > posts.json
          echo "Synced $(cat posts.json | grep -c 'id') articles from Notion"

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add posts.json
          git diff --staged --quiet || git commit -m "docs: sync Notion articles $(date +'%Y-%m-%d')"
          git push
