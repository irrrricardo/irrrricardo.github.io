<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | irrrricardo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        html { scroll-behavior: smooth; }
        body.dark { background: #0a0a0a; color: #fff; }
        
        .nav-container {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            height: 60px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-logo {
            color: white;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        .nav-links a:hover, .nav-links a.active { color: #fff; }
        
        .nav-controls {
            display: flex;
            gap: 15px;
        }
        
        .nav-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            transition: color 0.3s;
        }
        
        .nav-btn:hover { color: #fff; }
        
        .page-header {
            padding: 120px 20px 60px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .page-header h1 {
            font-size: 3rem;
            color: white;
            margin-bottom: 10px;
        }
        
        .page-header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
        }
        
        .content-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        .blog-post {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        body.dark .blog-post {
            background: #1a1a1a;
        }
        
        .blog-post:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }
        
        .blog-date {
            color: #667eea;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .blog-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1a1a1a;
        }
        
        body.dark .blog-title { color: #fff; }
        
        .blog-excerpt {
            color: #666;
            line-height: 1.7;
            margin-bottom: 20px;
        }
        
        body.dark .blog-excerpt { color: #aaa; }
        
        .blog-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .blog-tag {
            background: #f0f0f0;
            color: #666;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        body.dark .blog-tag { background: #333; color: #aaa; }
        
        /* 文章详情页 */
        .article-viewer {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        body.dark .article-viewer {
            background: #1a1a1a;
        }
        
        .article-viewer.active {
            display: block;
        }
        
        .articles-list.hidden {
            display: none;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .article-content {
            color: #333;
            line-height: 1.8;
            font-size: 1.1rem;
        }
        
        body.dark .article-content { color: #ddd; }
        
        .article-content h2 {
            margin: 30px 0 15px;
            color: #1a1a1a;
        }
        
        body.dark .article-content h2 { color: #fff; }
        
        .article-content p {
            margin-bottom: 20px;
        }
        
        .article-content img {
            max-width: 100%;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .article-content ul {
            margin: 20px 0;
            padding-left: 25px;
        }
        
        .article-content li {
            margin-bottom: 10px;
        }
        
        .article-content blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 20px 0;
            color: #555;
            font-style: italic;
        }
        
        body.dark .article-content blockquote { color: #aaa; }
        
        footer {
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #eee;
            color: #666;
            background: white;
        }
        
        body.dark footer { background: #111; border-color: #333; }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .blog-post { padding: 30px; }
            .article-viewer { padding: 25px; }
        }
    </style>
</head>
<body>
    <nav class="nav-container">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">irrrricardo</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <a href="blog.html" class="active">Blog</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="nav-controls">
                <button class="nav-btn" onclick="toggleLanguage()">🌐</button>
                <button class="nav-btn" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <h1 data-i18n="blog_title">Blog</h1>
        <p data-i18n="blog_subtitle">Thoughts on AI, Healthcare & Technology</p>
    </div>

    <div class="content-section">
        <!-- 文章列表 -->
        <div class="articles-list" id="articlesList"></div>
        
        <!-- 文章详情 -->
        <div class="article-viewer" id="articleViewer">
            <button class="back-btn" onclick="showArticlesList()">
                ← 返回文章列表
            </button>
            <div id="articleContent"></div>
        </div>
    </div>

    <footer>
        <p>© 2024 irrrricardo. All rights reserved.</p>
    </footer>

    <script>
        // ============================================
        // 博客文章数据 - 在这里添加你的文章
        // ============================================
        
        const posts = [
            {
                id: 1,
                title: '我的第一篇博客文章',
                date: '2024-03-28',
                tags: ['随笔'],
                content: `
                    <h2>欢迎来到我的博客</h2>
                    <p>这是我的第一篇博客文章。我会在这里分享我的学习心得、项目经验和有趣的想法。</p>
                    
                    <h2>关于这个博客</h2>
                    <p>这个博客是用 HTML 手工编写的，简单直接。所有文章都直接写在代码里。</p>
                    
                    <h2>未来计划</h2>
                    <ul>
                        <li>分享更多技术文章</li>
                        <li>记录学习历程</li>
                        <li>展示个人项目</li>
                    </ul>
                    
                    <blockquote>保持学习，保持进步！</blockquote>
                `
            },
            {
                id: 2,
                title: '深度学习入门指南',
                date: '2024-03-20',
                tags: ['AI', '教程'],
                content: `
                    <h2>深度学习简介</h2>
                    <p>深度学习是机器学习的一个分支，使用多层神经网络来学习数据的特征表示。</p>
                    
                    <h2>基本概念</h2>
                    <p>神经网络由输入层、隐藏层和输出层组成。每一层包含多个神经元。</p>
                    
                    <h2>应用领域</h2>
                    <ul>
                        <li>计算机视觉 - 图像识别、目标检测</li>
                        <li>自然语言处理 - 文本分类、机器翻译</li>
                        <li>语音识别 - 语音助手、声纹识别</li>
                        <li>医疗诊断 - 医学影像分析</li>
                    </ul>
                `
            },
            {
                id: 3,
                title: '北京大学学习生活',
                date: '2024-03-15',
                tags: ['生活', '教育'],
                content: `
                    <h2>我的北大之旅</h2>
                    <p>在北京大学学习是一件令人兴奋的事情。这里有优秀的师资、丰富的资源和多元的学术氛围。</p>
                    
                    <h2>双学位体验</h2>
                    <p>我同时学习基础医学和经济学两个专业。这种跨学科的学习让我对医疗健康领域有了更全面的理解。</p>
                    
                    <blockquote>在北大，每一次课堂都是一场思维的碰撞。</blockquote>
                `
            }
        ];
        
        // ============================================
        // 渲染文章列表
        // ============================================
        
        function renderArticles() {
            const container = document.getElementById('articlesList');
            container.innerHTML = posts.map(post => `
                <div class="blog-post" onclick="showArticle(${post.id})">
                    <p class="blog-date">${post.date}</p>
                    <h2 class="blog-title">${post.title}</h2>
                    <div class="blog-tags">
                        ${post.tags.map(tag => `<span class="blog-tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // ============================================
        // 显示文章详情
        // ============================================
        
        function showArticle(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                document.getElementById('articlesList').classList.add('hidden');
                document.getElementById('articleViewer').classList.add('active');
                document.getElementById('articleContent').innerHTML = `
                    <h1 class="blog-title" style="font-size:2rem;margin-bottom:20px;">${post.title}</h1>
                    <p class="blog-date" style="margin-bottom:30px;">${post.date}</p>
                    <div class="article-content">${post.content}</div>
                    <div class="blog-tags" style="margin-top:40px;">
                        ${post.tags.map(tag => `<span class="blog-tag">${tag}</span>`).join('')}
                    </div>
                `;
                window.scrollTo(0, 0);
            }
        }
        
        // ============================================
        // 返回文章列表
        // ============================================
        
        function showArticlesList() {
            document.getElementById('articlesList').classList.remove('hidden');
            document.getElementById('articleViewer').classList.remove('active');
        }
        
        // ============================================
        // 语言切换
        // ============================================
        
        const translations = {
            en: {
                blog_title: 'Blog',
                blog_subtitle: 'Thoughts on AI, Healthcare & Technology'
            },
            zh: {
                blog_title: '博客',
                blog_subtitle: '关于人工智能、医疗健康与技术的思考'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';
        let isDark = localStorage.getItem('theme') === 'dark';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('lang', currentLang);
            applyLanguage();
        }

        function applyLanguage() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.textContent = translations[currentLang][el.getAttribute('data-i18n')];
            });
            document.querySelectorAll('.nav-links a').forEach((link, i) => {
                const pages = ['Home', 'About', 'Projects', 'Blog', 'Contact'];
                const pagesZh = ['首页', '关于', '项目', '博客', '联系'];
                link.textContent = currentLang === 'en' ? pages[i] : pagesZh[i];
            });
        }

        function toggleTheme() {
            isDark = !isDark;
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.body.classList.toggle('dark', isDark);
        }

        // ============================================
        // 启动
        // ============================================
        
        applyLanguage();
        if (isDark) document.body.classList.add('dark');
        renderArticles();
    </script>
</body>
</html>
